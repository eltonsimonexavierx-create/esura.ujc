{% load static %}
<div class="login-card">
    <img src="{% static 'img/logo_ujc.png' %}" class="logo-ujc">
    <p class="text-welcome">Bem-vindo ao</p>
    <p class="text-system">ESURA</p>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Utilizador/Email</label>
            <input type="text" name="username" placeholder="Digite o Utilizador">
        </div>

        <div class="form-group">
            <label>Senha *</label>
            <div class="password-container">
                <input type="password" name="password" placeholder="Digite sua senha">
                <span class="eye-icon">👁</span>
            </div>
        </div>

        <a href="#" class="link-forgot">Esqueceu a senha?</a>

        <button type="submit" class="btn-submit">Entrar</button>
    </form>

    <span class="version">v 2026.03.12-30431ca</span>
</div>
