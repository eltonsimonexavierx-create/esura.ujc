{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA UJC</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .container { 
            background: white; width: 900px; height: 550px; 
            display: flex; border-radius: 20px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }

        /* Lado Esquerdo */
        .banner { 
            width: 50%; background-image: url('https://ujc.ac.mz'); 
            background-size: cover; background-position: center; 
        }

        /* Lado Direito */
        .login-section { 
            width: 50%; padding: 40px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative;
        }

        .logo { width: 85px; margin-bottom: 10px; }
        .welcome-text { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 25px; }

        form { width: 100%; max-width: 280px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 5px; font-weight: 600; }
        
        input { 
            width: 100%; padding: 10px 15px; border: 1px solid #ddd; 
            border-radius: 10px; font-size: 13px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: #3b82f6; }

        .forgot-password { 
            display: block; font-size: 10px; color: #3b82f6; 
            text-decoration: none; margin-bottom: 20px; margin-top: 5px;
        }

        .btn-entrar { 
            width: 100%; padding: 12px; border: 1px solid #3b82f6; 
            background: transparent; color: #3b82f6; border-radius: 10px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 13px;
        }
        .btn-entrar:hover { background: #f0f7ff; }

        .version { position: absolute; bottom: 20px; font-size: 9px; color: #ccc; font-family: monospace; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Lado Esquerdo -->
        <div class="banner"></div>

        <!-- Lado Direito -->
        <div class="login-section">
            <img src="{% static 'imagens/UJC.png' %}" alt="Logo UJC" class="logo">
            <div class="welcome-text">Bem-vindo ao ESURA</div>

            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <label>Utilizador/Email</label>
                    <input type="text" name="username" placeholder="Digite o Utilizador/Email" required>
                </div>

                <div class="input-group">
                    <label>Senha *</label>
                    <input type="password" name="password" placeholder="Digite sua senha" required>
                </div>

                <a href="#" class="forgot-password">Esqueceu a senha?</a>

                <button type="submit" class="btn-entrar">➔ Entrar</button>
            </form>

            <div class="version">v2026.03.12-30431ca</div>
        </div>
    </div>

</body>
</html>
