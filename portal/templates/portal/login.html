{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - ESURA UJC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #ffffff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { width: 250px; border: 1px solid #e5e7eb; border-radius: 35px; padding: 30px 20px; text-align: center; background: white; }
        .logo { width: 100px; height: auto; margin-bottom: 15px; }
        .titulo { font-size: 16px; font-weight: 700; color: #1f2937; line-height: 1.2; margin-bottom: 25px; }
        form { width: 100%; text-align: left; }
        .group { margin-bottom: 12px; position: relative; }
        label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 5px; margin-left: 10px; }
        .red { color: #ef4444; font-weight: bold; position: absolute; margin-left: 3px; }
        input { width: 100%; padding: 10px 18px; border: 1px solid #d1d5db; border-radius: 50px; font-size: 13px; outline: none; color: #374151; }
        .forgot { display: block; font-size: 11px; color: #3b82f6; text-decoration: none; margin: 10px 0 20px 10px; }
        .btn { width: 100%; padding: 10px; border: 1px solid #3b82f6; background: white; color: #3b82f6; border-radius: 50px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .ver { margin-top: 40px; font-size: 10px; color: #9ca3af; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{% static 'imagens/UJC.png' %}" alt="Logo" class="logo">
        <div class="titulo">Bem-vindo ao<br>ESURA</div>
        <form method="post">
            {% csrf_token %}
            <div class="group">
                <label>Utilizador/Email</label>
                <input type="text" name="username" placeholder="Digite o Utilizador" required>
            </div>
            <div class="group">
                <label>Senha <span class="red">*</span></label>
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <a href="#" class="forgot">Esqueceu a senha?</a>
            <button type="submit" class="btn"><span>➔</span> Entrar</button>
        </form>
        <div class="ver">v 2026.03.12-30431ca</div>
    </div>
</body>
</html>
