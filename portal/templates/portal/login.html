<!-- Lado Direito: Login -->
<div class="w-full md:w-1/2 flex flex-col items-center justify-center px-12 relative">
    
    <!-- 1. LOGOTIPO (Reduzido e no topo) -->
    <div class="mb-4">
        <img src="{% static 'imagens/UJC.png' %}" alt="UJC" style="width: 60px; height: auto;">
    </div>

    <!-- 2. TEXTO DE BOAS-VINDAS -->
    <div class="text-center mb-6">
        <h1 class="text-xl font-bold text-gray-800">Bem-vindo ao ESURA</h1>
        <p class="text-[12px] text-gray-500 font-black uppercase tracking-[0.2em] mt-1">
            Universidade Joaquim Chissano
        </p>
    </div>

    <!-- 3. FORMULÁRIO -->
    <form method="post" class="w-full max-w-sm space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-[11px] font-bold text-gray-500 mb-1 ml-1 uppercase">Utilizador/Email</label>
            <input type="text" name="username" placeholder="Digite o Utilizador/Email" required 
                   class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none text-sm">
        </div>
        <div>
            <label class="block text-[11px] font-bold text-gray-500 mb-1 ml-1 uppercase">Senha *</label>
            <input type="password" name="password" placeholder="Digite sua senha" required 
                   class="w-full px-5 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-400 outline-none text-sm">
        </div>

        <!-- BOTÕES EMPILHADOS -->
        <button type="submit" class="w-full btn-entrar font-bold py-3 rounded-2xl flex items-center justify-center gap-3 mt-4">
            <span>➔</span> Entrar
        </button>
        
        <button type="button" class="w-full text-[11px] text-blue-500 font-bold hover:underline mt-2">
            Esqueceu a Senha?
        </button>
    </form>

    <!-- RODAPÉ -->
    <div class="absolute bottom-6">
        <p class="text-[9px] text-gray-300 font-mono italic">v2026.04.23-UJC-ESURA</p>
    </div>
</div>
