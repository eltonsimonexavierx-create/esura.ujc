{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA UJC</title>
    <style>
        body { background: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: Arial, sans-serif; }
        .card { width: 260px; border: 1px solid #e5e7eb; border-radius: 30px; padding: 35px 25px; text-align: center; }
        .logo { width: 140px; margin-bottom: 20px; }
        .welcome { font-size: 16px; font-weight: bold; margin-bottom: 25px; line-height: 1.2; color: #1f2937; }
        .group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 13px; color: #4b5563; margin-bottom: 8px; margin-left: 10px; }
        .red { color: #ef4444; font-weight: bold; }
        input { width: 100%; padding: 12px 20px; border: 1px solid #d1d5db; border-radius: 50px; font-size: 13px; outline: none; }
        .forgot { display: block; font-size: 12px; color: #3b82f6; text-decoration: none; margin: 15px 0 25px 10px; }
        .btn { width: 100%; padding: 12px; border: 1px solid #3b82f6; background: white; color: #3b82f6; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .ver { margin-top: 40px; font-size: 11px; color: #9ca3af; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <img src="{% static 'imagens/UJC.png' %}" class="logo">
        <div class="welcome">Bem-vindo ao<br>ESURA</div>
        <form method="post">
            {% csrf_token %}
            <div class="group">
                <label>Utilizador/Email</label>
                <input type="text" name="username" placeholder="Digite o Utilizador" required>
            </div>
            <div class="group">
                <label>Senha <span class="red">*</span></label>
                <input type="password" name="password" placeholder="Digite sua senha" required>
            </div>
            <a href="#" class="forgot">Esqueceu a senha?</a>
            <button type="submit" class="btn"><span>➔</span> Entrar</button>
        </form>
        <div class="ver">v 2026.03.12-30431ca</div>
    </div>
</body>
</html>
