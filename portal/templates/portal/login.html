{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA UJC</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background-color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        /* A CHAVE PARA AFINAR: largura máxima de 260px */
        .container { 
            width: 100%; 
            max-width: 260px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        .login-card {
            border: 1px solid #e2e8f0;
            border-radius: 35px; /* Bordas bem redondas como na foto */
            padding: 30px 20px;
            width: 100%;
            text-align: center;
        }

        .logo { width: 90px; margin-bottom: 15px; }
        
        .welcome-text { 
            font-size: 15px; 
            font-weight: 700; 
            color: #1f2937; 
            line-height: 1.2;
        }
        
        .sub-text {
            font-size: 15px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 25px; 
        }

        form { width: 100%; text-align: left; }
        
        .input-group { margin-bottom: 12px; } 
        
        label { 
            display: block; 
            font-size: 12px; 
            color: #6b7280; 
            margin-bottom: 5px; 
            margin-left: 5px;
        }
        
        /* Inputs bem ovais e finos */
        input { 
            width: 100%; 
            padding: 9px 15px; 
            border: 1px solid #cbd5e1; 
            border-radius: 30px; 
            font-size: 12px; 
            outline: none; 
            color: #64748b;
        }

        .forgot-password { 
            display: block; 
            font-size: 11px; 
            color: #3b82f6; 
            text-decoration: none; 
            margin: 10px 0 20px 5px; 
        }

        /* Botão com o contorno azul fino da imagem */
        .btn-entrar { 
            width: 100%; 
            padding: 9px; 
            border: 1px solid #3b82f6; 
            background: white; 
            color: #3b82f6; 
            border-radius: 30px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            font-size: 13px;
        }

        .version { 
            margin-top: 35px; 
            font-size: 10px; 
            color: #94a3b8; 
            font-family: monospace; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <!-- LOGOTIPO -->
            <img src="{% static 'imagens/UJC.png' %}" alt="Logo UJC" class="logo">

            <!-- TEXTOS -->
            <div class="welcome-text">Bem-vindo ao</div>
            <div class="sub-text">ESURA</div>

            <!-- FORMULÁRIO -->
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <label>Utilizador/Email</label>
                    <input type="text" name="username" placeholder="Digite o Utilizador" required>
                </div>

                <div class="input-group">
                    <label>Senha *</label>
                    <div style="position: relative;">
                        <input type="password" name="password" placeholder="Digite sua senha" required>
                        <span style="position: absolute; right: 12px; top: 9px; font-size: 12px; color: #94a3b8;">👁️</span>
                    </div>
                </div>

                <a href="#" class="forgot-password">Esqueceu a senha?</a>

                <button type="submit" class="btn-entrar">
                    <span>➔</span> Entrar
                </button>
            </form>

            <div class="version">v 2026.03.12-30431ca</div>
        </div>
    </div>

</body>
</html>
