{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA UJC</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background-color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        .container { 
            width: 100%; 
            max-width: 290px; /* Tornou-se muito mais fino */
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        .login-card {
            border: 1px solid #ededed;
            border-radius: 20px;
            padding: 20px 15px; /* Espaços internos mínimos */
            width: 100%;
            text-align: center;
        }

        .logo { width: 85px; margin-bottom: 8px; } /* Logo reduzido */
        
        .welcome-text { 
            font-size: 14px; 
            font-weight: 700; 
            color: #1f2937; 
            margin-bottom: 2px; 
        }
        
        .sub-text {
            font-size: 14px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 15px; 
        }

        form { width: 100%; text-align: left; }
        
        .input-group { margin-bottom: 10px; } 
        
        label { 
            display: block; 
            font-size: 12px; 
            color: #6b7280; 
            margin-bottom: 3px; 
            margin-left: 8px;
        }
        
        input { 
            width: 100%; 
            padding: 8px 15px; /* Inputs mais estreitos */
            border: 1px solid #d1d5db; 
            border-radius: 20px; 
            font-size: 12px; 
            outline: none; 
        }

        .forgot-password { 
            display: block; 
            font-size: 11px; 
            color: #3b82f6; 
            text-decoration: none; 
            margin: 8px 0 12px 8px; 
        }

        .btn-entrar { 
            width: 100%; 
            padding: 8px; 
            border: 1px solid #3b82f6; 
            background: white; 
            color: #3b82f6; 
            border-radius: 20px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px;
            font-size: 13px;
        }

        .version { 
            margin-top: 20px; 
            font-size: 10px; 
            color: #aaa; 
            font-family: monospace; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <!-- LOGOTIPO -->
            <img src="{% static 'imagens/UJC.png' %}" alt="Logo UJC" class="logo">

            <!-- TEXTOS -->
            <div class="welcome-text">Bem-vindo ao</div>
            <div class="sub-text">ESURA</div>

            <!-- FORMULÁRIO -->
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <label>Utilizador/Email</label>
                    <input type="text" name="username" placeholder="Digite o Utilizador" required>
                </div>

                <div class="input-group">
                    <label>Senha *</label>
                    <div style="position: relative;">
                        <input type="password" name="password" placeholder="Digite sua senha" required>
                    </div>
                </div>

                <a href="#" class="forgot-password">Esqueceu a senha?</a>

                <button type="submit" class="btn-entrar">
                    <span>➔</span> Entrar
                </button>
            </form>

            <div class="version">v 2026.03.12-30431ca</div>
        </div>
    </div>

</body>
</html>
