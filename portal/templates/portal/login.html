{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA UJC</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background-color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 10px;
        }
        
        .container { 
            width: 100%; 
            max-width: 350px; /* Reduzido de 400px para 350px */
            display: flex; 
            flex-direction: column;
            align-items: center; 
            text-align: center;
        }

        .login-card {
            border: 1px solid #e5e7eb;
            border-radius: 25px;
            padding: 25px 20px; /* Reduzi o espaço interno (padding) */
            width: 100%;
        }

        .logo { width: 100px; margin-bottom: 10px; } /* Logo um pouco menor */
        
        .welcome-text { 
            font-size: 16px; 
            font-weight: 700; 
            color: #1f2937; 
            margin-bottom: 2px; 
        }
        
        .sub-text {
            font-size: 16px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 20px; /* Espaço reduzido abaixo do título */
        }

        form { width: 100%; text-align: left; }
        
        .input-group { margin-bottom: 12px; } /* Reduzi o espaço entre campos */
        
        label { 
            display: block; 
            font-size: 13px; 
            color: #4b5563; 
            margin-bottom: 4px; 
            margin-left: 10px;
        }
        
        input { 
            width: 100%; 
            padding: 10px 18px; /* Input mais fino */
            border: 1px solid #d1d5db; 
            border-radius: 25px; 
            font-size: 13px; 
            outline: none; 
        }

        .forgot-password { 
            display: block; 
            font-size: 12px; 
            color: #3b82f6; 
            text-decoration: none; 
            margin: 10px 0 15px 10px; /* Comprimido */
        }

        .btn-entrar { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #3b82f6; 
            background: white; 
            color: #3b82f6; 
            border-radius: 25px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px;
            font-size: 14px;
        }

        .version { 
            margin-top: 25px; /* Menos espaço no rodapé */
            font-size: 11px; 
            color: #9ca3af; 
            font-family: monospace; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <!-- LOGOTIPO -->
            <img src="{% static 'imagens/UJC.png' %}" alt="Logo UJC" class="logo">

            <!-- TEXTOS -->
            <div class="welcome-text">Bem-vindo ao</div>
            <div class="sub-text">ESURA</div>

            <!-- FORMULÁRIO -->
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <label>Utilizador/Email</label>
                    <input type="text" name="username" placeholder="Digite o Utilizador" required>
                </div>

                <div class="input-group">
                    <label>Senha *</label>
                    <div style="position: relative;">
                        <input type="password" name="password" placeholder="Digite sua senha" required>
                        <span style="position: absolute; right: 15px; top: 10px; color: #999; font-size: 12px;">👁️</span>
                    </div>
                </div>

                <a href="#" class="forgot-password">Esqueceu a senha?</a>

                <button type="submit" class="btn-entrar">
                    <span>➔</span> Entrar
                </button>
            </form>

            <div class="version">v 2026.03.12-30431ca</div>
        </div>
    </div>

</body>
</html>
