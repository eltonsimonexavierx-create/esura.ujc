{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA UJC</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { 
            background-color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        /* ULTRA-FINO: Largura máxima reduzida para 100px */
        .container { 
            width: 100px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        .login-card {
            border: 1px solid #ededed;
            border-radius: 10px;
            padding: 10px 5px;
            width: 100%;
            text-align: center;
        }

        .logo { width: 75px; margin-bottom: 8px; }
        
        .welcome-text { 
            font-size: 13px; 
            font-weight: 700; 
            color: #1a1a1a; 
            line-height: 1.1;
        }
        
        .sub-text {
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 20px; 
        }

        form { width: 100%; text-align: left; }
        
        .input-group { margin-bottom: 10px; } 
        
        label { 
            display: block; 
            font-size: 11px; 
            color: #777; 
            margin-bottom: 4px; 
            margin-left: 8px;
        }
        
        /* Inputs super ovais e finos */
        input { 
            width: 100%; 
            padding: 7px 10px; 
            border: 1px solid #ddd; 
            border-radius: 30px; 
            font-size: 11px; 
            outline: none; 
            color: #555;
        }

        .forgot-password { 
            display: block; 
            font-size: 10px; 
            color: #3b82f6; 
            text-decoration: none; 
            margin: 8px 0 15px 8px; 
        }

        /* Botão contornado e fino */
        .btn-entrar { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #3b82f6; 
            background: white; 
            color: #3b82f6; 
            border-radius: 20px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px;
            font-size: 12px;
        }

        .version { 
            margin-top: 30px; 
            font-size: 9px; 
            color: #bbb; 
            font-family: monospace; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <!-- LOGOTIPO -->
            <img src="{% static 'imagens/UJC.png' %}" alt="Logo UJC" class="logo">

            <!-- TEXTOS -->
            <div class="welcome-text">Bem-vindo ao</div>
            <div class="sub-text">ESURA</div>

            <!-- FORMULÁRIO -->
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
    <label>Senha <span style="color: red; font-weight: bold;">*</span></label>
    <div style="position: relative;">
        <input type="password" name="password" placeholder="Digite sua senha" required>
    </div>
</div>

                <div class="input-group">
                    <label>Senha *</label>
                    <div style="position: relative;">
                        <input type="password" name="password" placeholder="Digite sua senha" required>
                    </div>
                </div>

                <a href="#" class="forgot-password">Esqueceu a senha?</a>

                <button type="submit" class="btn-entrar">
                    <span>➔</span> Entrar
                </button>
            </form>

            <div class="version">v 2026.03.12-30431ca</div>
        </div>
    </div>

</body>
</html>
