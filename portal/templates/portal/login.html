{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA UJC</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background-color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        
        .container { 
            background: white; 
            width: 100%; 
            max-width: 400px; /* Largura ideal para telemóveis */
            display: flex; 
            flex-direction: column;
            align-items: center; 
            text-align: center;
        }

        /* Estilo do Card (Borda suave da imagem) */
        .login-card {
            border: 1px solid #e5e7eb;
            border-radius: 30px;
            padding: 40px 30px;
            width: 100%;
        }

        .logo { width: 120px; margin-bottom: 20px; }
        
        .welcome-text { 
            font-size: 18px; 
            font-weight: 700; 
            color: #1f2937; 
            margin-bottom: 5px; 
        }
        
        .sub-text {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 30px;
        }

        form { width: 100%; text-align: left; }
        
        .input-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: 14px; 
            color: #4b5563; 
            margin-bottom: 8px; 
            margin-left: 5px;
        }
        
        input { 
            width: 100%; 
            padding: 12px 20px; 
            border: 1px solid #d1d5db; 
            border-radius: 25px; 
            font-size: 14px; 
            outline: none; 
            color: #6b7280;
        }

        .forgot-password { 
            display: block; 
            font-size: 13px; 
            color: #3b82f6; 
            text-decoration: none; 
            margin-bottom: 25px; 
            margin-top: 10px;
        }

        .btn-entrar { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #3b82f6; 
            background: white; 
            color: #3b82f6; 
            border-radius: 25px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            font-size: 15px;
        }

        .version { 
            margin-top: 40px; 
            font-size: 12px; 
            color: #9ca3af; 
            font-family: monospace; 
        }

        /* Esconder banner em tablets e telemóveis */
        @media (max-width: 768px) {
            body { background-color: white; }
            .login-card { border: 1px solid #eee; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <!-- LOGOTIPO -->
            <img src="{% static 'imagens/UJC.png' %}" alt="Logo UJC" class="logo">

            <!-- TEXTOS -->
            <div class="welcome-text">Bem-vindo ao</div>
            <div class="sub-text">ESURA</div>

            <!-- FORMULÁRIO -->
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <label>Utilizador/Email</label>
                    <input type="text" name="username" placeholder="Digite o Utilizador/Email" required>
                </div>

                <div class="input-group">
                    <label>Senha *</label>
                    <div style="position: relative;">
                        <input type="password" name="password" placeholder="Digite sua senha" required>
                        <span style="position: absolute; right: 15px; top: 12px; color: #999;">👁️</span>
                    </div>
                </div>

                <a href="#" class="forgot-password">Esqueceu a senha?</a>

                <button type="submit" class="btn-entrar">
                    <span>➔</span> Entrar
                </button>
            </form>

            <div class="version">v 2026.03.12-30431ca</div>
        </div>
    </div>

</body>
</html>
