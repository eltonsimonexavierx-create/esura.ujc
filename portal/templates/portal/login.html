{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA UJC</title>
    <style>
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            background-color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        /* CARD ULTRA FINO E ALTO */
        .login-card {
            width: 250px; /* Medida exata para ser fino como na foto */
            border: 1px solid #d1d5db;
            border-radius: 25px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LOGOTIPO AJUSTADO */
        .logo { width: 130px; height: auto; margin-bottom: 20px; }
        
        .welcome-text { 
            font-size: 15px; 
            font-weight: bold; 
            color: #1a1a1a; 
            margin-bottom: 25px;
            line-height: 1.4;
        }

        form { width: 100%; }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        
        label { 
            display: block; 
            font-size: 13px; 
            color: #4b5563; 
            margin-bottom: 8px; 
            margin-left: 5px;
        }

        .asterisco { color: #e11d48; font-weight: bold; }
        
        /* INPUTS OVAIS COMO NA IMAGEM */
        input { 
            width: 100%; 
            padding: 10px 18px; 
            border: 1px solid #d1d5db; 
            border-radius: 50px; 
            font-size: 13px; 
            outline: none; 
            color: #6b7280;
        }

        .forgot-password { 
            display: block; 
            font-size: 11px; 
            color: #3b82f6; 
            text-decoration: none; 
            margin: 15px 0 20px 5px;
        }

        /* BOTÃO DE CONTORNO AZUL */
        .btn-entrar { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #3b82f6; 
            background: white; 
            color: #3b82f6; 
            border-radius: 50px; 
            font-weight: 500; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            font-size: 14px;
        }

        .version { 
            margin-top: 40px; 
            font-size: 10px; 
            color: #9ca3af; 
            font-family: monospace; 
        }

        /* ÍCONE DO OLHO NA SENHA */
        .password-wrapper { position: relative; }
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #6b7280;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <!-- LOGOTIPO -->
        <img src="{% static 'imagens/UJC.png' %}" alt="Logo UJC" class="logo">

        <!-- TEXTOS -->
        <div class="welcome-text">
            Bem-vindo ao<br>ESURA
        </div>

        <!-- FORMULÁRIO -->
        <form method="post">
            {% csrf_token %}
            <div class="input-group">
                <label>Utilizador/Email</label>
                <input type="text" name="username" placeholder="Digite o Utilizador" required>
            </div>

            <div class="input-group">
                <label>Senha <span class="asterisco">*</span></label>
                <div class="password-wrapper">
                    <input type="password" name="password" placeholder="Digite sua senha" required>
                    <span class="eye-icon">👁️</span>
                </div>
            </div>

            <a href="#" class="forgot-password">Esqueceu a senha?</a>

            <button type="submit" class="btn-entrar">
                <span>➔</span> Entrar
            </button>
        </form>

        <div class="version">v 2026.03.12-30431ca</div>
    </div>

</body>
</html>
