{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo ao ESURA - UJC</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background-color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        
        /* CONTAINER ULTRA-FINO */
        .container { 
            width: 230px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
        }

        .login-card {
            border: 1px solid #ededed;
            border-radius: 35px;
            padding: 25px 15px;
            width: 100%;
            text-align: center;
        }

        .logo { width: 75px; margin-bottom: 12px; }
        
        .welcome-text { 
            font-size: 13px; 
            font-weight: 700; 
            color: #1a1a1a; 
            line-height: 1.1;
        }
        
        .sub-text {
            font-size: 13px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 20px; 
        }

        form { width: 100%; text-align: left; }
        
        .input-group { 
            margin-bottom: 10px; 
            position: relative; /* Necessário para o asterisco não empurrar nada */
        } 
        
        label { 
            display: block; 
            font-size: 11px; 
            color: #777; 
            margin-bottom: 4px; 
            margin-left: 8px;
        }

        /* O ASTERISCO QUE NÃO ESTRAGA A ORGANIZAÇÃO */
        .required-mark {
            color: red;
            position: absolute;
            font-weight: bold;
            margin-left: 2px;
        }
        
        input { 
            width: 100%; 
            padding: 7px 15px; 
            border: 1px solid #ddd; 
            border-radius: 30px; 
            font-size: 11px; 
            outline: none; 
            color: #555;
        }

        .forgot-password { 
            display: block; 
            font-size: 10px; 
            color: #3b82f6; 
            text-decoration: none; 
            margin: 8px 0 15px 8px; 
        }

        .btn-entrar { 
            width: 100%; 
            padding: 7px; 
            border: 1px solid #3b82f6; 
            background: white; 
            color: #3b82f6; 
            border-radius: 30px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 5px;
            font-size: 12px;
        }

        .version { 
            margin-top: 30px; 
            font-size: 9px; 
            color: #bbb; 
            font-family: monospace; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-card">
            <!-- LOGOTIPO -->
            <img src="{% static 'imagens/UJC.png' %}" alt="Logo UJC" class="logo">

            <!-- TEXTOS -->
            <div class="welcome-text">Bem-vindo ao</div>
            <div class="sub-text">ESURA</div>

            <!-- FORMULÁRIO -->
            <form method="post">
                {% csrf_token %}
                
                <!-- UTILIZADOR -->
                <div class="input-group">
                    <label>Utilizador/Email</label>
                    <input type="text" name="username" placeholder="Digite o Utilizador" required>
                </div>

                <!-- SENHA COM ASTERISCO VERMELHO QUE NÃO MOVE O LAYOUT -->
                <div class="input-group">
                    <label>Senha <span class="required-mark">*</span></label>
                    <input type="password" name="password" placeholder="Digite sua senha" required>
                </div>

                <a href="#" class="forgot-password">Esqueceu a senha?</a>

                <button type="submit" class="btn-entrar">
                    <span>➔</span> Entrar
                </button>
            </form>

            <div class="version">v 2026.04.23-UJC-ESURA</div>
        </div>
    </div>

</body>
</html>
