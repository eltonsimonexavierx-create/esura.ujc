{% load static %}
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ESURA UJC</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; }
        .login-card { border-radius: 1.5rem; overflow: hidden; }
        .input-field { border: 1px solid #d1d5db; transition: all 0.3s; }
        .input-field:focus { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
        .btn-entrar { border: 1px solid #3b82f6; color: #3b82f6; transition: all 0.3s; }
        .btn-entrar:hover { background-color: #eff6ff; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <!-- Contentor Principal (Card) -->
    <div class="bg-white w-full max-w-5xl h-[580px] shadow-sm flex login-card border border-gray-100">
        
        <!-- LADO ESQUERDO: Banner com Imagem de Fundo -->
        <div class="hidden md:block w-1/2 p-0">
            <div class="w-full h-full bg-cover bg-center" 
                 style="background-image: url('https://ujc.ac.mz');">
                 <!-- Overlay opcional para escurecer a imagem se desejar -->
                 <div class="w-full h-full bg-black/10"></div>
            </div>
        </div>

        <!-- LADO DIREITO: Formulário de Login -->
        <div class="w-full md:w-1/2 flex flex-col items-center justify-center px-16 relative">
            
            <!-- LOGOTIPO -->
            <div class="mb-4">
                <img src="{% static 'imagens/UJC.png' %}" alt="Logo UJC" class="w-24 h-auto">
            </div>

            <!-- TEXTO DE BOAS-VINDAS -->
            <div class="text-center mb-8">
                <h1 class="text-sm font-bold text-gray-800">Bem-vindo ao ESURA</h1>
            </div>

            <!-- FORMULÁRIO -->
            <form method="post" class="w-full space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-[11px] text-gray-500 mb-1 ml-1">Utilizador/Email</label>
                    <input type="text" name="username" placeholder="Digite o Utilizador/Email" required 
                           class="w-full px-4 py-2.5 bg-white input-field rounded-lg outline-none text-xs">
                </div>

                <div>
                    <label class="block text-[11px] text-gray-500 mb-1 ml-1">Senha *</label>
                    <input type="password" name="password" placeholder="Digite sua senha" required 
                           class="w-full px-4 py-2.5 bg-white input-field rounded-lg outline-none text-xs">
                </div>

                <!-- ESQUECEU A SENHA -->
                <div class="text-left">
                    <a href="#" class="text-[10px] text-blue-500 hover:underline">Esqueceu a senha?</a>
                </div>

                <!-- BOTÃO ENTRAR -->
                <button type="submit" class="w-full btn-entrar font-medium py-2.5 rounded-lg flex items-center justify-center gap-2 text-xs mt-2">
                    <span>➔</span> Entrar
                </button>
            </form>

            <!-- RODAPÉ / VERSÃO -->
            <div class="absolute bottom-6">
                <p class="text-[9px] text-gray-400 font-mono">v2026.03.12-30431ca</p>
            </div>

        </div>
    </div>

</body>
</html>
